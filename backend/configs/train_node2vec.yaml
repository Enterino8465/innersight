# Run: python scripts/train_embeddings.py --config configs/train_node2vec.yaml
#      python scripts/train.py --config configs/train_node2vec.yaml
# GPU: python scripts/train.py --config configs/train_node2vec.yaml --device cuda
# Quick pipeline check: python scripts/train.py --config configs/train_node2vec.yaml --quick

node2vec:
  embedding_dim: 128
  walk_length: 20
  context_size: 10
  walks_per_node: 20
  p: 1.0
  q: 0.8
  epochs: 50
  batch_size: 128
  lr: 0.01
  embeddings_path: checkpoints/node2vec_embeddings.pt

model:
  type: mlp
  layer_sizes: [146, 128, 64, 1]  # 18 flat features + 128 Node2Vec embeddings = 146 input

training:
  epochs: 50
  batch_size: 64
  lr: 0.001
  pos_weight: 50.0
  patience: 5

data:
  dir: null  # uses INNERSIGHT_DATA_DIR env var if null

output:
  model_path: checkpoints/n2v/best_model.pt
  preprocessor_path: checkpoints/n2v/preprocessor.pt
  log_file: logs/training_n2v.log
