# Run: python scripts/train.py --config configs/train_mlp.yaml
# GPU: python scripts/train.py --config configs/train_mlp.yaml --device cuda
# Quick pipeline check: python scripts/train.py --config configs/train_mlp.yaml --quick

model:
  type: mlp
  layer_sizes: [18, 64, 32, 1]

training:
  epochs: 50
  batch_size: 64
  lr: 0.001
  pos_weight: 50.0
  patience: 5

data:
  dir: null  # uses INNERSIGHT_DATA_DIR env var if null

output:
  model_path: checkpoints/flat/best_model.pt
  preprocessor_path: checkpoints/flat/preprocessor.pt
  log_file: logs/training_flat.log
