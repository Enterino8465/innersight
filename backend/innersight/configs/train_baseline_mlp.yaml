# MLP baseline (Phase 3) — flattened 28-day deviation windows + focal loss.
# Consumed by scripts/train_mlp_baseline.py (its defaults mirror these values).
model:
  type: mlp
  input_dim: 504        # 18 features × 28 days, flattened (+5 if OCEAN concatenated)
  layer_sizes: [64, 32, 1]
  dropout: 0.4

training:
  loss: focal
  focal_alpha: 0.75
  focal_gamma: 2.0
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  max_epochs: 100
  patience: 10
  batch_size: 64

evaluation:
  primary_metric: auprc
  n_folds: 5
  seeds: [42, 123, 456]
