name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install ruff
        run: pip install ruff
      - name: Check
        run: ruff check backend/
      - name: Format
        run: ruff format --check backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        working-directory: backend
        run: |
          pip install -e ".[dev]"
      - name: Test
        working-directory: backend
        run: python -m pytest tests/ -x --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -f backend/Dockerfile .
      - name: Build frontend
        run: docker build -f frontend/Dockerfile frontend/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: frontend
        run: npm ci && npm run build

  smoke-test:
    name: Smoke Test (synthetic data)
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - working-directory: backend
        run: pip install -e ".[dev]"
      - name: Load synthetic demo data
        run: |
          cd backend
          python -c "
          from innersight.data.pipeline import load_version
          ds = load_version('../data/synthetic_demo', 'r4.2')
          assert len(ds.logs['logon']) > 0
          print('Synthetic demo data loads OK')
          "
