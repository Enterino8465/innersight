services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - INNERSIGHT_MODEL_DIR=/models
      - QDRANT_URL=http://qdrant:6333
      # No INNERSIGHT_DATA_DIR → the image falls back to its bundled synthetic
      # demo data (/app/demo_data). To use real CERT data, uncomment the volume
      # mount below and the matching line here:
      # - INNERSIGHT_DATA_DIR=/data
    volumes:
      - ./backend/checkpoints:/models
      # - /path/to/cert_r4.2:/data  # uncomment for real CERT data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
